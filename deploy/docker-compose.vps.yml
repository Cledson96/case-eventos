name: ${COMPOSE_PROJECT_NAME:-case-eventos}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER obrigatorio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB obrigatorio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE obrigatoria}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-../.env.backend}
    command: sh -c "npm run db:deploy && npm start"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3333}:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3333/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE obrigatoria}
    restart: unless-stopped
    env_file:
      - ${FRONTEND_ENV_FILE:-../.env.frontend}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
