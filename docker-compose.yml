services:
  postgres:
    image: postgres:17-alpine
    container_name: case-eventos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: case_eventos
      POSTGRES_PASSWORD: case_eventos
      POSTGRES_DB: case_eventos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U case_eventos -d case_eventos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: case-eventos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
